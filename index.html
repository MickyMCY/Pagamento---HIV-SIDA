<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Checkout Manual</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-animation"></div>

<div class="container">

<!-- ETAPA 1 -->
<section id="step1" class="step active">
<h1>Finalizar Pagamento</h1>
<p class="subtitle">Acesso liberado após confirmação manual</p>

<div class="price">244 MZN</div>

<div class="form-group">
<input type="text" id="nome" placeholder="Nome completo">
<small class="error" id="nomeErro"></small>
</div>

<div class="form-group">
<input type="tel" id="telefone" placeholder="Número (9 dígitos)">
<small class="error" id="telErro"></small>
</div>

<button id="btnStep1" class="primary-btn">PROSSEGUIR</button>

<div class="scarcity">
Restam <span id="vagas">18</span> vagas promocionais
</div>

</section>

<!-- ETAPA 2 -->
<section id="step2" class="step">
<h2>Escolha o Método de Pagamento</h2>

<div class="countdown">
Tempo restante: <span id="timer">10:00</span>
<div class="progress-bar">
<div id="progress"></div>
</div>
</div>

<button class="mpesa-btn payment-btn" data-type="mpesa">
Pagar com M-Pesa
</button>

<button class="emola-btn payment-btn" data-type="emola">
Pagar com e-Mola
</button>

<small class="back" onclick="voltar(1)">voltar</small>

</section>

<!-- ETAPA 3 -->
<section id="step3" class="step">
<h2>Dados para Pagamento Manual</h2>

<div id="paymentInfo"></div>

<button id="copiarBtn" class="copy-btn">COPIAR NÚMERO</button>

<div id="processingInfo" class="processing hidden">
Aguardando confirmação manual...
<div class="loader"></div>
<div class="verify-bar">
<div id="verifyProgress"></div>
</div>
</div>

<button id="confirmBtn" class="confirm-btn hidden">
Avançar
</button>

<small class="back" onclick="voltar(2)">voltar</small>

</section>

</div>

<div id="toast"></div>
<div id="notifications"></div>

<script src="script.js"></script>
</body>
</html>
