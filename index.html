<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Finalizar Pagamento</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<div class="container">

    <!-- ETAPA 1 -->
    <section class="screen active" id="step1">
        <h1>Finalizar Pagamento</h1>
        <p class="sub">Acesso liberado após confirmação manual</p>
        <div class="price">Valor Total: 244 MZN</div>

        <div class="form-group">
            <label>Nome completo</label>
            <input type="text" id="name">
            <small class="error" id="nameError"></small>
        </div>

        <div class="form-group">
            <label>Número de telefone</label>
            <input type="tel" id="phone" maxlength="9">
            <small class="error" id="phoneError"></small>
        </div>

        <button class="primary" id="goStep2">PROSSEGUIR</button>
    </section>

    <!-- ETAPA 2 -->
    <section class="screen" id="step2">
        <h2>Escolha o Método de Pagamento</h2>

        <button class="mpesa" id="mpesaBtn">Pagar com M-Pesa</button>
        <button class="emola" id="emolaBtn">Pagar com e-Mola</button>

        <span class="back" onclick="goBack(1)">voltar</span>
    </section>

    <!-- ETAPA 3 -->
    <section class="screen" id="step3">
        <h2>Dados para Transferência</h2>

        <div class="payment-box">
            <p id="paymentInfo"></p>
            <button class="copy" id="copyBtn">Copiar Número</button>
        </div>

        <div class="manual-info" id="manualInfo"></div>

        <div class="waiting" id="waiting">
            Aguarde 15 segundos após efetuar o pagamento.
            <div class="spinner"></div>
        </div>

        <button class="confirm" id="confirmBtn">Receber Receita</button>

        <span class="back" onclick="goBack(2)">voltar</span>
    </section>

</div>

<script src="script.js"></script>
</body>
</html>
